name: Translate
on:
  push:
    branches: [main]
    paths:
      - 'i18n.json'
      - 'locales/en.json'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Translate
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: npx lingo.dev@latest run
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "feat: update translations via @LingoDotDev"
          git push
