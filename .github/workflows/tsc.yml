name: TypeScript Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
